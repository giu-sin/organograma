<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publination — Organograma</title>
<style>
  :root{--cream:#FBF3CD;--black:#161514;--card:#fffdf2;--border:#16151426;--muted:#6b675a;--pill:#16151410;--good:#1d7a4f;--warn:#b3261e}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
  body{background:var(--cream);color:var(--black);padding:20px;font-size:14.5px}
  .wrap{max-width:1500px;margin:0 auto}
  .topnav{display:flex;align-items:center;gap:14px;padding:10px 20px;margin:-20px -20px 16px;background:var(--black);flex-wrap:wrap}
  .topnav .brand{font-size:19px;letter-spacing:-.5px;text-decoration:none;color:var(--cream)}
  .topnav .brand b{font-weight:900}.topnav .brand i{font-weight:600;font-style:italic}
  .topnav .sp{flex:1}
  .topnav a.lnk{text-decoration:none;color:var(--cream);font-weight:800;font-size:13px;padding:7px 14px;border-radius:30px;opacity:.75}
  .topnav a.lnk:hover{opacity:1;background:#fbf3cd22}
  .topnav a.lnk.active{background:var(--cream);color:var(--black);opacity:1}
  .logo{font-size:30px;letter-spacing:-1px}.logo b{font-weight:900}.logo i{font-weight:600;font-style:italic}
  .sub{color:var(--muted);margin-bottom:14px;font-size:13.5px;max-width:820px;line-height:1.5}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;position:sticky;top:0;background:var(--cream);padding:8px 0;z-index:20}
  button{background:var(--black);color:var(--cream);border:none;border-radius:30px;padding:10px 16px;font-size:13px;font-weight:800;cursor:pointer}
  button.ghost{background:transparent;color:var(--black);border:2px solid var(--black)}
  input,select{background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--black);padding:8px 10px;font-size:13px}
  input:focus,select:focus{outline:none;border-color:var(--black)}
  #search{min-width:200px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .chip{border:2px solid var(--black);background:transparent;border-radius:30px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer}
  .chip.on{background:var(--black);color:var(--cream)}
  .chip .c{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:0}

  .scrollbox{overflow:auto;border:2px solid var(--black);border-radius:14px;background:var(--card);box-shadow:3px 3px 0 var(--black);padding:18px}
  .tree, .tree ul{display:flex;justify-content:center;list-style:none}
  .tree{min-width:max-content;padding-top:4px}
  .tree ul{position:relative;padding-top:18px}
  .tree li{list-style:none;position:relative;padding:18px 6px 0;display:flex;flex-direction:column;align-items:center}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--border);width:50%;height:18px}
  .tree li::after{right:auto;left:50%;border-left:2px solid var(--border)}
  .tree li:only-child::before,.tree li:only-child::after{display:none}
  .tree li:only-child{padding-top:4px}
  .tree li:first-child::before,.tree li:last-child::after{border:0 none}
  .tree li:last-child::before{border-right:2px solid var(--border);border-radius:0 6px 0 0}
  .tree li:first-child::after{border-radius:6px 0 0 0}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--border);width:0;height:18px}
  .tree > li{padding-top:0}
  .tree > li::before,.tree > li::after{display:none}

  .node{position:relative;background:#fff;border:2px solid var(--black);border-left-width:6px;border-radius:10px;padding:8px 12px;min-width:150px;max-width:210px;cursor:pointer;box-shadow:2px 2px 0 var(--black);transition:transform .08s}
  .node:hover{transform:translateY(-1px)}
  .node .nm{font-weight:900;font-size:13px;line-height:1.2}
  .node .rl{font-size:11px;color:var(--muted);margin-top:1px}
  .node .ar{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:1px 6px;border-radius:20px;margin-top:5px;color:#fff}
  .node .ac{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.25}
  .node .av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--black);margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;overflow:hidden}
  .node .em{font-size:9.5px;color:var(--muted);margin-top:2px;word-break:break-all}
  .photo-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .photo-prev{width:66px;height:66px;border-radius:50%;object-fit:cover;border:2px solid var(--black);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff;overflow:hidden;flex-shrink:0}
  .node.vaga{border-style:dashed;background:#fff6f5}
  .node.freela{background:#fbfaf0}
  .node.hit{box-shadow:0 0 0 3px #ffd34d, 2px 2px 0 var(--black)}
  .node.dim{opacity:.32}
  .node .tog{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--cream);border-radius:20px;font-size:10px;font-weight:900;padding:1px 8px;border:2px solid var(--cream);white-space:nowrap}
  .node .badge{position:absolute;top:-9px;right:-6px;font-size:8.5px;font-weight:800;padding:1px 6px;border-radius:20px}
  .badge.novo{background:#1d7a4f;color:#fff}.badge.vagab{background:#b3261e;color:#fff}.badge.freelab{background:#8a6d00;color:#fff}

  .modal{display:none;position:fixed;inset:0;background:#16151488;z-index:60;align-items:center;justify-content:center;padding:16px}
  .modal.show{display:flex}
  .sheet{background:var(--card);border:2px solid var(--black);border-radius:16px;padding:20px;max-width:460px;width:100%;box-shadow:4px 4px 0 var(--black);max-height:92vh;overflow:auto}
  .sheet h3{font-size:16px;font-weight:900;margin-bottom:12px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11.5px;font-weight:700;margin-bottom:3px}
  .field input,.field select{width:100%}
  .modal-actions{display:flex;gap:8px;justify-content:space-between;margin-top:16px;flex-wrap:wrap}
  .stat{font-size:12px;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--good);color:#fff;padding:12px 22px;border-radius:30px;font-weight:800;box-shadow:3px 3px 0 #16151455;opacity:0;transition:opacity .2s;pointer-events:none;z-index:80}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="topnav">
  <a class="brand" href="organograma.html"><b>PUBLI</b><i>NATION</i></a>
  <span class="sp"></span>
  <span style="color:var(--cream);font-weight:800;font-size:13px;opacity:.85">🏛️ Organograma do time</span>
</div>
<div class="wrap">
  <div class="logo"><b>PUBLI</b><i>NATION</i></div>
  <p class="sub">Organograma vivo do time ✨ Clica em qualquer pessoa pra editar (cargo, área, a quem reporta). Filtra por área, busca por nome, e vê quem é chefe de quem. As mudanças salvam no seu navegador — use <b>Exportar</b> pra compartilhar/guardar.</p>

  <div class="toolbar">
    <button onclick="openEdit(null)">+ Adicionar pessoa</button>
    <input id="search" placeholder="🔎 buscar nome, cargo, conta..." oninput="render()">
    <button class="ghost" onclick="expandAll()">⌄ Expandir tudo</button>
    <button class="ghost" onclick="collapseDefault()">⌃ Recolher</button>
    <button class="ghost" onclick="exportJSON()">⬇ Exportar</button>
    <button class="ghost" onclick="document.getElementById('imp').click()">⬆ Importar</button>
    <button class="ghost" onclick="resetSeed()">↺ Restaurar</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">
    <span class="stat" id="stat"></span>
  </div>
  <div class="chips" id="areaChips"></div>

  <div class="scrollbox"><div id="tree"></div></div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="modalTitle">Editar pessoa</h3>
    <div class="photo-row">
      <div class="photo-prev" id="f_prev"></div>
      <div>
        <button class="ghost" type="button" onclick="document.getElementById('f_photo').click()">📷 Subir foto</button>
        <button class="ghost" type="button" id="btnRmPhoto" onclick="clearPhoto()" style="display:none;margin-top:6px">remover foto</button>
        <input type="file" id="f_photo" accept="image/*" style="display:none" onchange="onPhoto(this)">
      </div>
    </div>
    <div class="field"><label>Nome</label><input id="f_name" oninput="renderPreview()"></div>
    <div class="field"><label>Cargo</label><input id="f_role" list="dl_roles"></div>
    <div class="field"><label>E-mail</label><input id="f_email" type="email" placeholder="nome@publination.com.br"></div>
    <div class="field"><label>Área</label><input id="f_area" list="dl_areas" oninput="renderPreview()"></div>
    <div class="field"><label>Reporta a (chefe)</label><select id="f_mgr"></select></div>
    <div class="field"><label>Contas / Marca</label><input id="f_acc"></div>
    <div class="field"><label>Status</label><input id="f_status" list="dl_status"></div>
    <div class="modal-actions">
      <button class="ghost" style="color:var(--warn);border-color:var(--warn)" id="btnDel" onclick="delPerson()">🗑 Excluir</button>
      <div style="display:flex;gap:8px">
        <button class="ghost" onclick="closeModal()">Cancelar</button>
        <button onclick="savePerson()">Salvar ✓</button>
      </div>
    </div>
  </div>
</div>
<datalist id="dl_areas"></datalist>
<datalist id="dl_status"><option value="Ativo"><option value="Novo"><option value="Freela"><option value="Processo aberto"></datalist>
<datalist id="dl_roles"></datalist>
<div class="toast" id="toast"></div>

 "accounts": "—", "status": "Ativo", "managerId": "p67"}, {"id": "p77", "name": "Bruna Sinhorini", "role": "Sócia", "area": "SÓCIOS", "accounts": "—", "status": "Ativo", "managerId": null}];
const LS_KEY = 'publi_org_v1';
const AREA_COLORS = {
  'DIRETORIA':'#161514','SÓCIOS':'#6d28d9','HUB DE CRIAÇÃO E ESTRATÉGIA':'#b3261e',
  'HUB DE NOVOS NEGÓCIOS':'#d97706','SAMSUNG':'#1d4ed8','MOÇA':'#be185d',
  'B.I.':'#0f766e','SOCIAL':'#7c3aed','ATENDIMENTO':'#1d7a4f','JURÍDICO E FINANCEIRO':'#475569'
};
const colorFor = a => AREA_COLORS[a] || '#6b675a';

let people = load();
let collapsed = new Set();
let editId = null;
let editPhoto = null;
let areaFilter = '';
let inited = false;

function load(){
  try{ const s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s); }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(people)); }catch(e){} }

const byId = id => people.find(p=>p.id===id);
const childrenOf = id => people.filter(p=>p.managerId===id);
function roots(){ const ids=new Set(people.map(p=>p.id)); return people.filter(p=>!p.managerId || !ids.has(p.managerId)); }
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function descendants(id, acc){ acc=acc||new Set(); childrenOf(id).forEach(c=>{acc.add(c.id);descendants(c.id,acc);}); return acc; }

function defaultCollapse(){
  collapsed = new Set();
  const walk=(p,depth)=>{ const k=childrenOf(p.id); if(depth>=2 && k.length) collapsed.add(p.id); k.forEach(c=>walk(c,depth+1)); };
  roots().forEach(r=>walk(r,0));
}
function expandAll(){ collapsed=new Set(); render(); }
function collapseDefault(){ defaultCollapse(); render(); }

function matchPred(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(!q && !areaFilter) return null;
  return p => (!areaFilter || p.area===areaFilter) &&
              (!q || [p.name,p.role,p.area,p.accounts].some(x=>(x||'').toLowerCase().includes(q)));
}
function ancestorsOf(id){ const a=[]; let p=byId(id); while(p && p.managerId){ a.push(p.managerId); p=byId(p.managerId);} return a; }

function nodeHtml(p, hitset){
  const kids=childrenOf(p.id);
  const isCol=collapsed.has(p.id);
  const col=colorFor(p.area);
  const cls=['node'];
  const st=(p.status||'').toLowerCase();
  if(st.includes('vaga')||st.includes('aberto')||(p.name||'').includes('VAGA')) cls.push('vaga');
  else if(st.includes('freela')) cls.push('freela');
  let badge='';
  if(st.includes('vaga')||st.includes('aberto')) badge='<span class="badge vagab">VAGA</span>';
  else if(st==='novo') badge='<span class="badge novo">NOVO</span>';
  else if(st.includes('freela')) badge='<span class="badge freelab">FREELA</span>';
  if(hitset){ if(hitset.has(p.id)) cls.push('hit'); else if(!hitset.ancestors.has(p.id)) cls.push('dim'); }
  const init=(p.name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const av=`<div class="av" style="${p.photo?'':'background:'+col}">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">`:esc(init)}</div>`;
  const node=`<div class="${cls.join(' ')}" style="border-left-color:${col}" onclick="openEdit('${p.id}')">
      ${badge}
      ${av}
      <div class="nm">${esc(p.name)}</div>
      <div class="rl">${esc(p.role)}</div>
      ${p.email?`<div class="em">✉ ${esc(p.email)}</div>`:''}
      <span class="ar" style="background:${col}">${esc(p.area)}</span>
      ${p.accounts && p.accounts!=='—' ? `<div class="ac">📁 ${esc(p.accounts)}</div>`:''}
      ${kids.length?`<span class="tog" onclick="event.stopPropagation();toggle('${p.id}')">${isCol?'▸ '+kids.length:'▾'}</span>`:''}
    </div>`;
  const childrenHtml = (kids.length && !isCol) ? `<ul>${kids.map(c=>nodeHtml(c,hitset)).join('')}</ul>` : '';
  return `<li>${node}${childrenHtml}</li>`;
}

function toggle(id){ if(collapsed.has(id)) collapsed.delete(id); else collapsed.add(id); render(); }

function render(){
  if(!inited){ defaultCollapse(); inited=true; }
  // chips
  const areas=[...new Set(people.map(p=>p.area).filter(Boolean))];
  document.getElementById('areaChips').innerHTML =
    `<div class="chip ${areaFilter===''?'on':''}" onclick="setArea('')">Todas</div>` +
    areas.map(a=>`<div class="chip ${areaFilter===a?'on':''}" onclick="setArea('${a.replace(/'/g,"\\'")}')"><span class="c" style="background:${colorFor(a)}"></span>${esc(a)}</div>`).join('');
  // datalists
  document.getElementById('dl_areas').innerHTML = areas.map(a=>`<option value="${esc(a)}">`).join('');
  document.getElementById('dl_roles').innerHTML = [...new Set(people.map(p=>p.role).filter(Boolean))].map(r=>`<option value="${esc(r)}">`).join('');
  // filtro -> hits + ancestrais (auto-expande)
  const pred=matchPred();
  let hitset=null;
  if(pred){
    const hits=new Set(people.filter(pred).map(p=>p.id));
    const anc=new Set();
    hits.forEach(id=>ancestorsOf(id).forEach(a=>{anc.add(a); collapsed.delete(a);}));
    hitset={has:id=>hits.has(id), ancestors:anc};
  }
  document.getElementById('tree').innerHTML = `<ul class="tree">${roots().map(r=>nodeHtml(r,hitset)).join('')}</ul>`;
  // stat
  const ativos=people.filter(p=>!((p.status||'').toLowerCase().includes('vaga')||(p.status||'').toLowerCase().includes('aberto'))).length;
  const vagas=people.length-ativos;
  document.getElementById('stat').textContent = `${people.length} no quadro · ${ativos} pessoas · ${vagas} vaga(s)`;
}
function setArea(a){ areaFilter = (areaFilter===a?'':a); render(); }

// ---- edição ----
function openEdit(id){
  editId=id;
  const p = id?byId(id):{name:'',role:'',area:areaFilter||'',accounts:'',status:'Ativo',managerId:null,email:'',photo:null};
  editPhoto = p.photo||null;
  document.getElementById('modalTitle').textContent = id?'Editar pessoa':'Nova pessoa';
  document.getElementById('f_name').value=p.name||'';
  document.getElementById('f_role').value=p.role||'';
  document.getElementById('f_email').value=p.email||'';
  document.getElementById('f_area').value=p.area||'';
  document.getElementById('f_acc').value=p.accounts||'';
  document.getElementById('f_status').value=p.status||'Ativo';
  renderPreview();
  // opções de chefe (exclui a própria pessoa e seus descendentes p/ evitar ciclo)
  const block = id ? descendants(id) : new Set();
  const opts = ['<option value="">— (topo, sem chefe) —</option>'].concat(
    people.filter(x=>x.id!==id && !block.has(x.id))
          .sort((a,b)=>a.name.localeCompare(b.name,'pt-BR'))
          .map(x=>`<option value="${x.id}" ${p.managerId===x.id?'selected':''}>${esc(x.name)} — ${esc(x.role)}</option>`));
  document.getElementById('f_mgr').innerHTML = opts.join('');
  document.getElementById('btnDel').style.display = id?'':'none';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); editId=null; }
function savePerson(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast('Põe um nome 🙂'); return; }
  const data={
    name, role:document.getElementById('f_role').value.trim(),
    email:document.getElementById('f_email').value.trim(),
    area:document.getElementById('f_area').value.trim(),
    accounts:document.getElementById('f_acc').value.trim(),
    status:document.getElementById('f_status').value.trim()||'Ativo',
    managerId:document.getElementById('f_mgr').value||null,
    photo:editPhoto||null
  };
  if(editId){ Object.assign(byId(editId), data); }
  else { data.id='p'+Date.now(); people.push(data); }
  save(); closeModal(); render(); toast('Salvo ✓');
}
function delPerson(){
  if(!editId) return;
  const kids=childrenOf(editId);
  const p=byId(editId);
  if(!confirm('Excluir '+p.name+'?'+(kids.length?' Os '+kids.length+' subordinados passam a reportar ao chefe dele.':''))) return;
  kids.forEach(c=>c.managerId=p.managerId||null);  // re-aponta os filhos
  people=people.filter(x=>x.id!==editId);
  save(); closeModal(); render(); toast('Excluído');
}

// ---- foto ----
function renderPreview(){
  const el=document.getElementById('f_prev');
  const nm=(document.getElementById('f_name').value||'?').trim();
  const init=nm.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'?';
  if(editPhoto){ el.style.background='none'; el.innerHTML='<img src="'+editPhoto+'" style="width:100%;height:100%;object-fit:cover">'; document.getElementById('btnRmPhoto').style.display=''; }
  else { el.style.background=colorFor(document.getElementById('f_area').value); el.textContent=init; document.getElementById('btnRmPhoto').style.display='none'; }
}
function onPhoto(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{ const img=new Image(); img.onload=()=>{
    const s=Math.min(img.width,img.height), N=128;
    const c=document.createElement('canvas'); c.width=c.height=N;
    c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,N,N);
    editPhoto=c.toDataURL('image/jpeg',0.82); renderPreview();
  }; img.src=e.target.result; };
  rd.readAsDataURL(f); inp.value='';
}
function clearPhoto(){ editPhoto=null; renderPreview(); }

// ---- import/export ----
function exportJSON(){
  const blob=new Blob([JSON.stringify(people,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='organograma_publination.json'; a.click();
}
function importJSON(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ const d=JSON.parse(e.target.result); if(Array.isArray(d)&&d.length){ people=d; save(); inited=false; render(); toast('Importado ✓'); } else toast('JSON inválido'); }catch(err){ toast('Erro ao ler JSON'); } };
  r.readAsText(f); inp.value='';
}
function resetSeed(){ if(confirm('Restaurar o organograma original (perde suas edições neste navegador)?')){ people=JSON.parse(JSON.stringify(SEED)); save(); inited=false; render(); toast('Restaurado'); } }

let toastT; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2000); }

render();
</script>
